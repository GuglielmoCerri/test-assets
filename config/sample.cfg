# sample-service configuration file
# Lines beginning with '#' are comments

APP_NAME="sample-service"
APP_VERSION="1.4.2"
APP_ENV="staging"

# Server settings
SERVER_HOST="0.0.0.0"
SERVER_PORT=8080
SERVER_TIMEOUT=30
SERVER_DEBUG=false

# Database
DB_HOST="db.internal"
DB_PORT=5432
DB_NAME="sample_db"
DB_USER="app_user"
DB_PASSWORD_FILE="/run/secrets/db_password"
DB_POOL_SIZE=10
DB_SSL=true

# Logging
LOG_LEVEL="INFO"
LOG_FILE="/var/log/sample-service.log"
LOG_FORMAT="json"

# Feature flags
FEATURE_A=true
FEATURE_B=false
MAX_RETRIES=3
