[general]
app_name = sample-service
version = 1.4.2
environment = staging
debug = false

[server]
host = 0.0.0.0
port = 8080
timeout = 30

[database]
host = db.internal
port = 5432
name = sample_db
user = app_user
pool_size = 10
ssl = true

[logging]
level = INFO
file = /var/log/sample-service.log
max_size_mb = 100
backup_count = 5

[cache]
backend = redis
host = cache.internal
port = 6379
ttl_seconds = 3600
